name: Garnet Sierra Android SDK CI
on:
  workflow_dispatch:
  schedule:
    - cron: '30 9 * * *'  # 09:30 UTC daily
jobs:
  build-android-sdk:
    name: Android SDK Build (Garnet)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Garnet Runtime Visibility
        uses: garnet-org/action@v2
        with:
          api_token: ${{ secrets.GARNET_API_TOKEN }}
          jibril_version: latest

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Resolve dependencies (downloads + extracts AARs)
        run: ./gradlew dependencies --no-daemon || true

      - name: Build SDK (assemble lib modules)
        run: ./gradlew :lib:assemble :lib-voice:assemble --no-daemon --stacktrace || true
